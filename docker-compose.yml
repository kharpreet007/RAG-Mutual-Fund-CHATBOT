version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Optional: persist the database to the host machine
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Next.js Server-side rewrites will resolve "backend" using Docker's internal DNS
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
